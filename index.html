<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ganga Home · Pricing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.22.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#f0f2f5;--bg4:#e4e7ec;
  --bd:#e0e3e8;--bd2:#cdd0d6;
  --txt:#111827;--txt2:#4b5563;--txt3:#9ca3af;--txt4:#d1d5db;
  --y:#ffe600;--yd:#c8b400;--ybg:#fffce0;--yb:#f0e000;
  --g:#16a34a;--gbg:#f0fdf4;--gb:#bbf7d0;
  --r:#dc2626;--rbg:#fef2f2;--rb:#fecaca;
  --b:#2563eb;--bbg:#eff6ff;--bbo:#bfdbfe;
  --o:#ea580c;--obg:#fff7ed;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
  --r10:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg2);color:var(--txt);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ── TOPBAR ── */
#topbar{
  background:var(--bg);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;
  position:sticky;top:0;z-index:200;overflow-x:auto;gap:2px;
}
.brand{
  font-weight:600;font-size:13.5px;white-space:nowrap;
  padding:0 18px 0 0;border-right:1px solid var(--bd);margin-right:10px;
  display:flex;align-items:center;gap:7px;height:48px;
}
.brand-icon{
  width:26px;height:26px;background:var(--y);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.tab-btn{
  padding:0 15px;height:48px;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--txt3);cursor:pointer;
  font-family:var(--font);font-size:13px;white-space:nowrap;
  display:flex;align-items:center;gap:6px;transition:color .15s;
}
.tab-btn:hover{color:var(--txt)}
.tab-btn.active{color:var(--txt);border-bottom-color:var(--y);font-weight:500}
.tab-btn i{font-size:15px}

/* ── CONTENT ── */
#content{max-width:1480px;margin:0 auto;padding:22px 20px}

/* ── CARD ── */
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r10);padding:18px 20px;margin-bottom:14px;box-shadow:var(--sh)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.card-title{font-size:11.5px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.card-title i{font-size:14px;color:var(--txt3)}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── METRIC CARDS ── */
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px 14px}
.kpi-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:600;letter-spacing:-.02em;font-family:var(--mono)}

/* ── TABLE (style of Image 2) ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:48px;z-index:5}
th{
  background:var(--bg2);padding:7px 12px;
  font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;
  color:var(--txt3);border-bottom:1px solid var(--bd);
  white-space:nowrap;text-align:left;
}
th.r{text-align:right}
td{padding:8px 12px;color:var(--txt);border-bottom:1px solid var(--bd);vertical-align:middle;font-size:13px}
td.r{text-align:right;font-family:var(--mono);font-size:12px}
td.mono{font-family:var(--mono);font-size:12px}
td.num{text-align:right;font-family:var(--mono);font-size:12px;color:var(--txt)}
td.dim{color:var(--txt3);font-size:12px}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
td.sticky,th.sticky{position:sticky;left:0;z-index:3;background:var(--bg)}
tbody tr:hover td.sticky{background:var(--bg2)}

/* ── GHOST INPUTS (look like plain text, activate on focus) ── */
.g-inp{
  background:transparent;border:1px solid transparent;border-radius:5px;
  color:var(--txt);font-family:var(--font);font-size:13px;
  padding:4px 6px;width:100%;outline:none;transition:border-color .15s,background .15s;
}
.g-inp:hover{border-color:var(--bd);background:var(--bg2)}
.g-inp:focus{border-color:var(--y);background:var(--bg);box-shadow:0 0 0 2px var(--ybg)}
.g-inp.num-inp{text-align:right;font-family:var(--mono);font-size:12px}
.g-inp.sm{width:80px}
.g-inp.md{width:120px}
.g-sel{
  background:transparent;border:1px solid transparent;border-radius:5px;
  color:var(--txt);font-family:var(--font);font-size:12px;
  padding:4px 6px;outline:none;cursor:pointer;transition:all .15s;
  max-width:180px;
}
.g-sel:hover{border-color:var(--bd);background:var(--bg2)}
.g-sel:focus{border-color:var(--y);background:var(--bg)}

/* ── CHECKBOX ── */
.chk{width:15px;height:15px;cursor:pointer;accent-color:var(--g)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);white-space:nowrap}
.badge-g{background:var(--gbg);color:var(--g);border:1px solid var(--gb)}
.badge-a{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.badge-r{background:var(--rbg);color:var(--r);border:1px solid var(--rb)}
.badge-b{background:var(--bbg);color:var(--b);border:1px solid var(--bbo)}
.badge-y{background:var(--ybg);color:var(--yd);border:1px solid var(--yb)}

/* ── BUTTONS ── */
button{
  background:var(--bg);border:1px solid var(--bd);border-radius:7px;
  color:var(--txt);cursor:pointer;font-family:var(--font);font-size:13px;
  padding:7px 14px;display:inline-flex;align-items:center;gap:6px;
  transition:all .15s;white-space:nowrap;
}
button:hover{background:var(--bg2);border-color:var(--bd2)}
button:active{transform:scale(.98)}
button.btn-primary{background:var(--y);border-color:var(--yb);color:#111;font-weight:500}
button.btn-primary:hover{background:var(--yb)}
button.btn-green{background:var(--gbg);border-color:var(--gb);color:var(--g)}
button.btn-red{background:var(--rbg);border-color:var(--rb);color:var(--r)}
button.btn-ghost{background:none;border:none;padding:5px 7px;color:var(--txt3)}
button.btn-ghost:hover{background:var(--bg2);color:var(--r);border:none}
button.btn-icon{background:none;border:none;padding:5px;color:var(--txt3);border-radius:5px}
button.btn-icon:hover{background:var(--rbg);color:var(--r)}

/* ── INPUTS ── */
input[type=text],input[type=number],input[type=month],select,textarea{
  background:var(--bg);border:1px solid var(--bd);border-radius:7px;
  color:var(--txt);font-family:var(--font);font-size:13px;
  padding:7px 10px;outline:none;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--y);box-shadow:0 0 0 2px var(--ybg)}

/* ── SEARCH ── */
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap i{position:absolute;left:9px;color:var(--txt3);font-size:14px;pointer-events:none}
.search-inp{padding-left:30px;width:220px;font-size:12.5px;background:var(--bg2);border-color:var(--bd)}

/* ── INFO BOX ── */
.info{background:var(--bbg);border:1px solid var(--bbo);border-radius:7px;padding:9px 13px;font-size:12px;color:var(--b);margin-bottom:13px;display:flex;gap:8px;line-height:1.6}

/* ── P&L ── */
.pl-row{display:flex;justify-content:space-between;align-items:center;padding:5px 2px;font-size:13px;border-bottom:1px solid var(--bg3)}
.pl-row:last-child{border-bottom:none}
.pl-row.sub{padding-left:18px;color:var(--txt2)}
.pl-row.total{font-weight:600;background:var(--bg2);padding:7px 10px;border-radius:6px;margin:3px 0;border:none}
.pl-val{font-family:var(--mono);font-size:12.5px}
.pl-pct{font-size:10px;color:var(--txt3);margin-left:10px;font-family:var(--mono)}

/* ── WATERFALL ── */
.wf{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.wf-row{display:flex;align-items:center;gap:8px;font-size:11.5px}
.wf-lbl{width:170px;color:var(--txt2);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wf-track{flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden}
.wf-fill{height:100%;border-radius:3px;min-width:2px}
.wf-num{width:80px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--txt2)}

/* ── HIST BARS ── */
.hist-bars{display:flex;align-items:flex-end;gap:4px;height:70px;margin-top:10px}
.hb-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.hb{width:100%;min-height:2px;border-radius:2px 2px 0 0;background:var(--y);border:1px solid var(--yb)}
.hb-lbl{font-size:8.5px;color:var(--txt3);white-space:nowrap}

/* ── IMPORT PANEL ── */
.imp-panel{border:1.5px dashed var(--bd2);border-radius:8px;padding:18px;margin-bottom:13px;background:var(--bg2)}

/* ── AI TAB ── */
.ai-msg{margin-bottom:12px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.65}
.ai-msg.user{background:var(--ybg);border:1px solid var(--yb);align-self:flex-end}
.ai-msg.bot{background:var(--bg2);border:1px solid var(--bd)}
.ai-chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--bd);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.ai-chip:hover{border-color:var(--y);background:var(--ybg);color:var(--yd)}
.dot-anim{display:inline-flex;gap:4px}
.dot-anim span{width:6px;height:6px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ── FLEX UTILS ── */
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lbl{font-size:11px;color:var(--txt2);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}

/* ── SAVE DOT ── */
#sdot{width:6px;height:6px;border-radius:50%;background:var(--g);opacity:0;transition:opacity .3s;flex-shrink:0}

/* ── RESPONSIVE ── */
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr}#content{padding:12px 10px}}
@media print{#topbar,button,input,select{display:none!important}.card{border:1px solid #ddd;box-shadow:none}}
</style>
</head>
<body>
<div id="topbar">
  <div class="brand"><div class="brand-icon">🏠</div> Ganga Home · Pricing <span id="sdot"></span></div>
  <button class="tab-btn active" id="t-prods"    onclick="go('prods')">   <i class="ti ti-package"></i>   Productos</button>
  <button class="tab-btn"        id="t-ml"        onclick="go('ml')">      <i class="ti ti-tag"></i>        Cargos ML</button>
  <button class="tab-btn"        id="t-cf"        onclick="go('cf')">      <i class="ti ti-building"></i>   Costos Fijos</button>
  <button class="tab-btn"        id="t-pricing"   onclick="go('pricing')"> <i class="ti ti-calculator"></i> Pricing &amp; P&amp;L</button>
  <button class="tab-btn"        id="t-precios"   onclick="go('precios')"> <i class="ti ti-circle-check"></i>Precios Actuales</button>
  <button class="tab-btn"        id="t-tn"        onclick="go('tn')">      <i class="ti ti-shopping-cart"></i>Tienda Nube</button>
  <button class="tab-btn"        id="t-ia"        onclick="go('ia')">      <i class="ti ti-brain"></i>      IA &amp; Machine Learning</button>
</div>
<div id="content">
  <div id="tab-prods"></div>
  <div id="tab-ml"      style="display:none"></div>
  <div id="tab-cf"      style="display:none"></div>
  <div id="tab-pricing" style="display:none"></div>
  <div id="tab-precios" style="display:none"></div>
  <div id="tab-tn"      style="display:none"></div>
  <div id="tab-ia"      style="display:none"></div>
</div>
<script>
/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const DEF_CATS = [
  {id:1,n:"Ropa de Cama / Textiles Hogar",    c:14.5},
  {id:2,n:"Cortinas y Persianas",             c:14.5},
  {id:3,n:"Toallas / Accesorios Baño",        c:14.5},
  {id:4,n:"Alfombras y Tapetes",              c:14.5},
  {id:5,n:"Almohadas y Rellenos",             c:14.5},
  {id:6,n:"Mantas / Edredones / Acolchados",  c:14.5},
  {id:7,n:"Decoración del Hogar",             c:14.5},
  {id:8,n:"Computación",                      c:16.5},
  {id:9,n:"Electrónica / Audio",              c:16.5},
  {id:10,n:"Indumentaria / Calzado",          c:16.5},
  {id:11,n:"Electrodomésticos",               c:13.3},
  {id:12,n:"Deportes y Fitness",              c:14.5},
  {id:13,n:"Herramientas / Construcción",     c:14.0},
  {id:14,n:"Bebés y Niños",                   c:14.0},
  {id:15,n:"Supermercado / Alimentos",        c:13.3},
];
const DEF_TIERS = [
  {id:1,label:"Hasta $15.000",   min:0,    max:15000,    costo:1095},
  {id:2,label:"$15k – $25k",    min:15001,max:25000,    costo:2190},
  {id:3,label:"$25k – $33k",    min:25001,max:33000,    costo:2628},
  {id:4,label:"Más de $33k",    min:33001,max:999999999,costo:0},
];
const CF_FIELDS = [
  {k:"oficina",          l:"Alquiler / Oficina"},
  {k:"sueldosAdmin",     l:"Sueldos Administrativos"},
  {k:"sueldosLogistica", l:"Sueldos Logística"},
  {k:"gastosTransporte", l:"Gastos Transporte"},
  {k:"gastosWarehouse",  l:"Gastos Warehouse"},
  {k:"insumos",          l:"Insumos / Embalajes"},
  {k:"publicidad",       l:"Publicidad y ADS"},
  {k:"percepciones",     l:"Percepciones IIBB/AFIP"},
  {k:"retenciones",      l:"Retenciones IIBB/AFIP"},
  {k:"multasFull",       l:"Multas / Cargos Full ML"},
  {k:"otrosGastos",      l:"Otros Gastos"},
];
const MN=["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MS=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const S={
  tab:'prods',
  prods:[
    {id:1,sku:'SET-CAM-180',mla:'',titulo:'Set Sábanas 2 Plazas Algodón 180h',costoConIva:28000,ivaR:21,costoSinIva:23140,defCatId:1},
    {id:2,sku:'ALM-FUND-P2',mla:'',titulo:'Funda Almohada Pack x2 50x70cm',   costoConIva:4500, ivaR:21,costoSinIva:3719, defCatId:3},
    {id:3,sku:'EDT-2P-MF200',mla:'',titulo:'Edredón 2 Plazas Microfibra 200g', costoConIva:45000,ivaR:21,costoSinIva:37190,defCatId:6},
  ],
  cats:[...DEF_CATS],
  tiers:[...DEF_TIERS],
  insumosRate:1.0,   // % del PVP para insumos/servicios (embalaje etc.)
  monthly:{},
  pConf:{},
  tn:{},
  checked:{},
  selMonth:'',
  targetMargin:20,
  nextId:4,
  importState:null,
  search:{},
  aiMsgs:[],
  aiLoading:false,
};

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
const nv=(v,d=0)=>{const x=parseFloat(v);return isNaN(x)?d:x};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fARS=v=>{
  if(v===null||v===undefined||isNaN(v))return'–';
  const f=new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(Math.abs(v));
  return v<0?`<span style="color:var(--r)">($ ${f})</span>`:`$ ${f}`;
};
const fARSn=v=>{if(!v&&v!==0)return'';return new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(v)};
const fPct=(v,d=1)=>(v===null||v===undefined||isNaN(v))?'–':`${v.toFixed(d)}%`;
const nowM=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const prevM=k=>{const[y,m]=k.split('-').map(Number);const d=new Date(y,m-2,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const nextM=k=>{const[y,m]=k.split('-').map(Number);const d=new Date(y,m,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const mLbl=k=>{if(!k)return'';const[y,m]=k.split('-');return`${MN[+m]} ${y}`};
const mLblS=k=>{if(!k)return'';const[y,m]=k.split('-');return`${MS[+m]} ${y}`};
const getCFml=(pvp,tiers)=>{for(const t of tiers)if(pvp>=t.min&&pvp<=t.max)return t.costo;return 0};

/* ── Core pricing calc (matches Excel formula) ── */
/* commAllIn = 14.5% = comisión Clásica ALREADY including IVA (as per billing data) */
const calcP=({costoConIva,pvp,commAllIn=14.5,insRt=1,ship=0,estruct=0})=>{
  if(!pvp||pvp<=0)return null;
  const comm  = pvp*commAllIn/100;         // Comisión ML (all-in, inc. IVA)
  const fxB   = getCFml(pvp,S.tiers);      // Cargo fijo (sub $33k)
  const dc    = pvp*0.006;                 // Impuesto Débito/Crédito 0.6%
  const iibb  = pvp*0.05;                  // IIBB + Imp. Provinciales 5%
  const ins   = pvp*insRt/100;             // Insumos + Servicios
  const tot   = nv(costoConIva)+comm+fxB+nv(ship)+dc+iibb+ins+nv(estruct);
  const m$    = pvp-tot;
  const mPct  = pvp>0?m$/pvp*100:0;
  return{comm,fxB,dc,iibb,ins,tot,m$,mPct};
};
const suggestPVP=({costoConIva,commAllIn=14.5,insRt=1,ship=0,estruct=0,target=20})=>{
  const m=target/100;
  let f=0,pvp=0;
  for(let i=0;i<6;i++){
    const den=1-commAllIn/100-0.05-0.006-insRt/100-m;
    if(den<=0)return null;
    pvp=(nv(costoConIva)+f+nv(ship)+nv(estruct))/den;
    f=getCFml(pvp,S.tiers);
  }
  return Math.ceil(pvp/100)*100;
};
const getEstruct=k=>{const m=S.monthly[k]||{};const t=CF_FIELDS.reduce((s,f)=>s+nv(m[f.k]),0);const u=nv(m.unidades,1);return u>0?t/u:0};
const getPConf=(sku,prod)=>{
  const c=S.pConf[sku]||{};
  const cat=S.cats.find(x=>x.id===(c.catId||prod?.defCatId||1))||S.cats[0];
  return{pvp:nv(c.pvp,0),catId:cat.id,cat,ship:nv(c.ship,0),units:nv(c.units,0),insRt:nv(c.insRt,S.insumosRate)};
};
const badge=pct=>{
  if(isNaN(pct)||pct===null)return'–';
  const cl=pct>=20?'badge-g':pct>=13?'badge-y':pct>=8?'badge-a':'badge-r';
  return`<span class="badge ${cl}">${fPct(pct)}</span>`;
};
const mCol=pct=>pct>=13?'var(--g)':pct>=8?'#b45309':'var(--r)';

const srchBar=(tabId,ph='Buscar por SKU o título...')=>`
  <div class="search-wrap">

function renderPricing(){
  const el=document.getElementById('tab-pricing');
  const est=getEstruct(S.selMonth);
  const filtered=srchFilter(S.prods,'pricing');
  const rows=filtered.map((prod,i)=>{
    const conf=getPConf(prod.sku,prod);
    const r=calcP({costoConIva:prod.costoConIva,pvp:conf.pvp,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est});
    const sug=!conf.pvp?suggestPVP({costoConIva:prod.costoConIva,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est,target:S.targetMargin}):null;
    const catOpts=S.cats.map(c=>`<option value="${c.id}" ${c.id===conf.catId?'selected':''}>${c.n}</option>`).join('');
    const chk=S.checked[prod.sku]?'checked':'';
    return`<tr>
      <td style="text-align:center"><input type="checkbox" class="chk" ${chk} title="Enviar a Precios Actuales" onchange="toggleChk('${esc(prod.sku)}',this.checked)"></td>
      <td class="dim">${i+1}</td>
      <td class="sticky mono">${esc(prod.sku)}</td>
      <td style="min-width:160px">${esc(prod.titulo)}</td>
      <td><select class="g-sel" style="max-width:160px" onchange="uPConf('${esc(prod.sku)}','catId',+this.value)">${catOpts}</select></td>
      <td style="background:#fffce0"><input class="g-inp num-inp" value="${conf.pvp||''}" style="width:100px;background:transparent" placeholder="PVP…" onchange="uPConf('${esc(prod.sku)}','pvp',+this.value)"></td>
      <td><input class="g-inp num-inp sm" value="${conf.ship||''}" placeholder="0" onchange="uPConf('${esc(prod.sku)}','ship',+this.value)"></td>
      <td><input class="g-inp num-inp sm" value="${conf.units||''}" placeholder="0" onchange="uPConf('${esc(prod.sku)}','units',+this.value)"></td>
      <td><input class="g-inp num-inp" value="${conf.insRt}" style="width:55px" step="0.1" onchange="uPConf('${esc(prod.sku)}','insRt',+this.value)"><span class="dim" style="font-size:10px">%</span></td>
      <td class="num dim">${fARS(prod.costoConIva)}</td>
      <td class="num dim">${r?fARS(r.comm):'–'}</td>
      <td class="num dim">${r&&r.fxB>0?fARS(r.fxB):'–'}</td>
      <td class="num dim">${r?fARS(r.dc+r.iibb):'–'}</td>
      <td class="num dim">${r?fARS(r.ins):'–'}</td>
      <td class="num dim">${est>0?fARS(est):'–'}</td>
      <td class="num"><b>${r?fARS(r.tot):'–'}</b></td>
      <td class="num" style="color:${r?mCol(r.mPct):'inherit'};font-weight:600">${r?fARS(r.m$):'–'}</td>
      <td>${r?badge(r.mPct):'–'}</td>
      <td class="num" style="color:var(--b)">${sug?fARS(sug):conf.pvp?'–':'<span style="font-size:11px;color:var(--txt3)">ingresá PVP</span>'}</td>
    </tr>`;
  }).join('');

  /* P&L aggregation */
  let tRev=0,tCogs=0,tComm=0,tFx=0,tDC=0,tIIBB=0,tIns=0,tEst=0,tShip=0,tU=0;
  S.prods.forEach(prod=>{
    const conf=getPConf(prod.sku,prod);
    const r=calcP({costoConIva:prod.costoConIva,pvp:conf.pvp,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est});
    const u=nv(conf.units,0);
    if(r&&conf.pvp>0&&u>0){
      tRev+=conf.pvp*u;tCogs+=nv(prod.costoConIva)*u;
      tComm+=r.comm*u;tFx+=r.fxB*u;tDC+=r.dc*u;
      tIIBB+=r.iibb*u;tIns+=r.ins*u;tShip+=conf.ship*u;
      tEst+=est*u;tU+=u;
    }
  });
  const tGross=tRev-tCogs;
  const tAfterML=tGross-tComm-tFx-tShip;
  const tAfterTax=tAfterML-tDC-tIIBB;
  const tAfterIns=tAfterTax-tIns;
  const tFixedM=CF_FIELDS.reduce((s,f)=>s+nv((S.monthly[S.selMonth]||{})[f.k]),0);
  const tNet=tAfterIns-tFixedM;
  const hasPL=tRev>0&&tU>0;
  const pvpAvg=tU>0?tRev/tU:0;

    <div class="tbl-wrap">
      <table>
        <thead><tr>

      </table>

  <div class="g2">
    <div class="card">

      ${!hasPL?`<div style="text-align:center;padding:28px;color:var(--txt3)">Completá PVP y Uni/Mes por producto para ver el P&L.</div>`:`
      <div>

    <div class="kpi"><div class="kpi-lbl">Total productos</div><div class="kpi-val">${totalProds}</div></div>

    <div class="kpi"><div class="kpi-lbl">Críticos (&lt;8%) / Sin PVP</div><div class="kpi-val" style="color:var(--r)">${crit} / ${sinPvp}</div></div>

    <div>

          :`<div class="tbl-wrap"><table>
            <thead><tr><th>SKU</th><th>Título</th><th class="r">Costo</th><th class="r">PVP actual</th><th class="r">Margen</th><th class="r" style="color:var(--b)">PVP sug. 15%</th></tr></thead>
            <tbody>${critRows}</tbody>

        ${warn>0?`<div style="margin-top:12px;padding:8px 12px;background:var(--obg);border-radius:6px;font-size:12px;color:var(--o)"><b>${warn}</b> productos en zona de atención (8–13%) — revisalos en Pricing.</div>`:''}

        <p style="font-size:12.5px;color:var(--txt2);line-height:1.7">

/* ═══════════════════════════════════════════════
   AI INTEGRATION
═══════════════════════════════════════════════ */
function buildCatalogContext(){
  const est=getEstruct(S.selMonth);
  const items=S.prods.map(prod=>{
    const conf=getPConf(prod.sku,prod);
    const r=calcP({costoConIva:prod.costoConIva,pvp:conf.pvp,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est});
    return{sku:prod.sku,titulo:prod.titulo.slice(0,60),costoConIva:prod.costoConIva,pvp:conf.pvp,margenPct:r?+r.mPct.toFixed(1):null,margenPesos:r?+r.m$.toFixed(0):null,envio:conf.ship,comisionPct:conf.cat.c};
  });
  const avgMgn=items.filter(i=>i.pvp>0&&i.margenPct!==null).reduce((s,i)=>s+i.margenPct,0)/Math.max(items.filter(i=>i.pvp>0).length,1);
  return{items,avgMgn:+avgMgn.toFixed(1),totalProds:S.prods.length,crit:items.filter(i=>i.pvp>0&&i.margenPct!==null&&i.margenPct<8).length,sinPvp:items.filter(i=>!i.pvp).length};
}

async function sendAIMsg(text){
  if(S.aiLoading)return;
  S.aiMsgs.push({role:'user',text});
  S.aiLoading=true;
  renderIA();
  const ctx=buildCatalogContext();
  const sysPrompt=`Sos un asesor de pricing especializado en e-commerce para Ganga Home, una tienda de textiles del hogar que vende en MercadoLibre Argentina exclusivamente en modalidad Clásica (sin cuotas sin interés).

DATOS DEL CATÁLOGO ACTUAL:
${JSON.stringify(ctx,null,2)}

ESTRUCTURA DE COSTOS:
- Comisión ML Clásica: all-in (incluye IVA 21%), varía por categoría, default 14.5% del PVP
- IIBB + Imp. Provinciales: 5% del PVP (fijo)
- Imp. Débito/Crédito: 0.6% del PVP (fijo)
- Insumos + Servicios (embalaje): ~1% del PVP (variable)

/* ═══════════════════════════════════════════════
   EXCEL IMPORT — PRODUCTOS
═══════════════════════════════════════════════ */
function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=evt=>{
    const wb=XLSX.read(evt.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(data.length<2){alert('Archivo vacío.');return}
    const hdr=data[0].map(h=>String(h));
    const rows=data.slice(1).filter(r=>r.some(c=>c!==''));
    const fi=names=>{for(const n of names){const i=hdr.findIndex(h=>h.toLowerCase().includes(n));if(i>=0)return i}return -1};
    // Auto-detect column mapping matching the Excel of Agustín
    S.importState={headers:hdr,rows,colMap:{
      sku:   Math.max(0,fi(['sku','codigo','code'])),
      mla:   fi(['mla','publicac']),
      titulo:Math.max(1,fi(['titulo','nombre','name','product'])),
      civa:  fi(['costo c','c/iva','civa','pvf']),
      siva:  fi(['costo s','s/iva','siva','neto','base']),
      ivar:  fi(['iva','tax']),
      pvp:   fi(['pvp','precio final','preciofinal','precio_final']),
      ship:  fi(['envio','envío','ship','flete']),
      tnlista:fi(['lista','precio tn l','tn lista']),
      tntransf:fi(['efe','precio tn e','tn efe','transf']),
    }};
  };
  r.readAsBinaryString(file);e.target.value='';
  renderProds();
}
function confirmImport(){
  if(!S.importState)return;
  const{rows,colMap:cm}=S.importState;
  let added=0;
  rows.forEach(r=>{
    const sku=String(r[cm.sku>=0?cm.sku:0]||'').trim();
    const titulo=String(r[cm.titulo>=0?cm.titulo:1]||'').trim();
    if(!sku&&!titulo)return;
    const civa=cm.civa>=0?nv(r[cm.civa]):0;
    const siva=cm.siva>=0?nv(r[cm.siva]):0;
    const ivaR=cm.ivar>=0?nv(r[cm.ivar],21):21;
    const mla=cm.mla>=0?String(r[cm.mla]||'').trim():'';
    let costoConIva=civa,costoSinIva=siva;
    if(costoConIva&&!costoSinIva)costoSinIva=Math.round(costoConIva/(1+ivaR/100));
    if(!costoConIva&&costoSinIva)costoConIva=Math.round(costoSinIva*(1+ivaR/100));
    S.nextId++;
    const newProd={id:S.nextId,sku:sku||'SKU-'+S.nextId,mla,titulo:titulo||'Sin título',costoConIva,costoSinIva,ivaR,defCatId:1};
    S.prods=[...S.prods,newProd];
    // Populate pConf if PVP/ship found
    if(cm.pvp>=0||cm.ship>=0){
      S.pConf={...S.pConf,[newProd.sku]:{pvp:cm.pvp>=0?nv(r[cm.pvp]):0,ship:cm.ship>=0?nv(r[cm.ship]):0}};
    }
    // Populate TN if found
    if(cm.tnlista>=0||cm.tntransf>=0){
      S.tn={...S.tn,[newProd.sku]:{lista:cm.tnlista>=0?nv(r[cm.tnlista]):0,transf:cm.tntransf>=0?nv(r[cm.tntransf]):0}};
    }
    added++;
  });
  S.importState=null;
  saveAll();
  alert(`${added} productos importados.`);
  renderProds();
}

/* ═══════════════════════════════════════════════
   TIENDA NUBE IMPORT
═══════════════════════════════════════════════ */
function importTN(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=evt=>{
    const wb=XLSX.read(evt.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(data.length<2){alert('Archivo vacío.');return}
    const hdr=data[0].map(h=>String(h).toLowerCase());
    const fi=names=>{for(const n of names){const i=hdr.findIndex(h=>h.includes(n));if(i>=0)return i}return-1};
    const cSku=fi(['sku','codigo']);
    const cLista=fi(['lista','pvp','precio']);
    const cTransf=fi(['transf','efe','costo','mayorista']);
    let imported=0;
    data.slice(1).forEach(row=>{
      const sku=String(row[cSku>=0?cSku:0]||'').trim();
      if(!sku)return;
      S.tn={...S.tn,[sku]:{lista:cLista>=0?nv(row[cLista]):0,transf:cTransf>=0?nv(row[cTransf]):0}};
      imported++;
    });
    sv('gh_tn',S.tn);
    alert(`${imported} precios de Tienda Nube importados.`);
    renderTN();
  };
  r.readAsBinaryString(file);e.target.value='';
}

function dlXlsx(data,name){const ws=XLSX.utils.aoa_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Datos');XLSX.writeFile(wb,`${name}.xlsx`)}
function exportProds(){
  const d=[['SKU','MLA','Título','IVA %','Costo s/IVA','Costo c/IVA','Categoría ML']];
  S.prods.forEach(p=>{const cat=S.cats.find(c=>c.id===p.defCatId);d.push([p.sku,p.mla||'',p.titulo,p.ivaR,p.costoSinIva,p.costoConIva,cat?cat.n:''])});

function exportPricing(){
  const est=getEstruct(S.selMonth);
  const d=[['Revisado','SKU','MLA','Título','Costo c/IVA','PVP','Envío','Uni/Mes','Comisión ML%','Comisión ML$','Cargo Fijo','IIBB+Imp%','IIBB+Imp$','Insumos%','Insumos$','Estructural','Total Costos','Ganancia $','Margen %','PVP Sugerido']];
  S.prods.forEach(p=>{
    const conf=getPConf(p.sku,p);const r=calcP({costoConIva:p.costoConIva,pvp:conf.pvp,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est});
    const sug=suggestPVP({costoConIva:p.costoConIva,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est,target:S.targetMargin});
    d.push([S.checked[p.sku]?'TRUE':'FALSE',p.sku,p.mla||'',p.titulo,p.costoConIva,conf.pvp,conf.ship,conf.units,conf.cat.c,r?+r.comm.toFixed(0):'',r?+r.fxB.toFixed(0):'',5,r?+( r.dc+r.iibb).toFixed(0):'',conf.insRt,r?+r.ins.toFixed(0):'',+est.toFixed(0),r?+r.tot.toFixed(0):'',r?+r.m$.toFixed(0):'',r?+(r.mPct).toFixed(2):'',sug||'']);
  });
  dlXlsx(d,'GH_Pricing_'+S.selMonth);
}
function exportPrecios(){
  const est=getEstruct(S.selMonth);
  const d=[['SKU','MLA','Título','Costo c/IVA','PVP','Comisión ML$','Imp. Déb/Créd + IIBB','Insumos','Envío','Estructural','Total Costos','Margen $','Margen %']];
  S.prods.filter(p=>S.checked[p.sku]).forEach(p=>{
    const conf=getPConf(p.sku,p);const r=calcP({costoConIva:p.costoConIva,pvp:conf.pvp,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est});
    d.push([p.sku,p.mla||'',p.titulo,p.costoConIva,conf.pvp,r?+r.comm.toFixed(0):'',r?+(r.dc+r.iibb).toFixed(0):'',r?+r.ins.toFixed(0):'',conf.ship,+est.toFixed(0),r?+r.tot.toFixed(0):'',r?+r.m$.toFixed(0):'',r?+(r.mPct).toFixed(2):'']);
  });
  dlXlsx(d,'GH_PreciosActuales');
}
function exportTN(){
  const est=getEstruct(S.selMonth);
  const d=[['SKU','Título','Precio Transferencia','Precio Lista TN','Precio ML','GAP $','GAP %','Margen TN%','Margen ML%']];
  S.prods.forEach(p=>{
    const conf=getPConf(p.sku,p);const tnD=S.tn[p.sku]||{};
    const r=calcP({costoConIva:p.costoConIva,pvp:conf.pvp,commAllIn:conf.cat.c,insRt:conf.insRt,ship:conf.ship,estruct:est});
    const gap=tnD.lista&&conf.pvp?conf.pvp-tnD.lista:'';
    const gapPct=tnD.lista&&conf.pvp?(conf.pvp-tnD.lista)/tnD.lista*100:'';
    const mgnTN=tnD.lista&&p.costoConIva?(tnD.lista-p.costoConIva)/tnD.lista*100:'';
    d.push([p.sku,p.titulo,tnD.transf||'',tnD.lista||'',conf.pvp||'',gap,gapPct?+gapPct.toFixed(2):'',mgnTN?+mgnTN.toFixed(2):'',r?+r.mPct.toFixed(2):'']);
  });
  dlXlsx(d,'GH_TiendaNube');
}
